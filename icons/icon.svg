<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="100" fill="#0f1923"/>
  <rect width="512" height="512" rx="100" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2b3c;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0f1923;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Colis -->
  <rect x="156" y="180" width="200" height="160" rx="16" fill="#c9933a" opacity="0.15"/>
  <rect x="156" y="180" width="200" height="160" rx="16" fill="none" stroke="#c9933a" stroke-width="10"/>
  <!-- Ruban horizontal -->
  <line x1="156" y1="260" x2="356" y2="260" stroke="#c9933a" stroke-width="10"/>
  <!-- Ruban vertical -->
  <line x1="256" y1="180" x2="256" y2="340" stroke="#c9933a" stroke-width="10"/>
  <!-- Lettre S -->
  <text x="256" y="295" font-family="Georgia,serif" font-size="90" font-weight="bold"
        text-anchor="middle" fill="#c9933a" opacity="0.9">S</text>
</svg>